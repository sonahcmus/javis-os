# ============================================================================
# Javis OS - HOSTINGER VPS (Docker Manager). Tên miền + HTTPS qua Traefik có sẵn của Hostinger.
#
# Hostinger có sẵn wildcard DNS *.<hostname-vps>.hstgr.cloud + Traefik tự cấp SSL. File này gắn nhãn
# Traefik ĐÚNG mẫu Hermes (mấu chốt: KHÔNG khai báo network). LƯU Ý: Hostinger KHÔNG tự cấp biến hostname
# cho compose dán tay (chỉ cấp cho app Catalog), nên BẠN PHẢI ĐẶT DOMAIN_NAME (1 biến). Thiếu -> deploy báo lỗi.
#
# CÁCH DÙNG:
#   1) Xem hostname VPS ở hPanel > VPS (vd: srv1782015.hstgr.cloud).
#   2) Docker Manager > Compose > URL > dán:
#      https://raw.githubusercontent.com/blogminhquy/javis-os/main/docker-compose.hostinger.yml
#   3) Ô Environment (Biến môi trường) đặt DOMAIN_NAME (BẮT BUỘC):
#         DOMAIN_NAME=javis.<hostname-vps>.hstgr.cloud     (link miễn phí, không cần mua tên miền)
#      Ví dụ:  DOMAIN_NAME=javis.srv1782015.hstgr.cloud
#      Muốn tên miền RIÊNG (vd javisos.com): DOMAIN_NAME=javisos.com + trỏ DNS A về IP VPS trước.
#   4) Deploy > đợi 1-3 phút Traefik cấp SSL > mở https://<DOMAIN_NAME>.
#
# GHI CHÚ:
#   - Không thấy ô Environment? Bấm Manage > sửa file .yaml, đổi thẳng dòng Host(...) thành tên miền:
#       Host(`javis.srv1782015.hstgr.cloud`)   (thay bằng hostname VPS của bạn).
#   - Chỉ truy cập qua https://<DOMAIN_NAME> (Traefik lo HTTPS). Cổng 7777 publish ngẫu nhiên, không vào trực tiếp.
#   - VPS KHÔNG phải Hostinger: bỏ file này, dùng docker-compose.yml + docker-compose.https.yml (Caddy).
#   - Image GHCR phải để PUBLIC (GitHub > Packages > javis-os > Package settings > Public).
# ============================================================================
services:
  javis:
    image: ghcr.io/blogminhquy/javis-os:latest
    container_name: javis
    restart: unless-stopped
    pull_policy: always
    environment:
      JAVIS_HOST: 0.0.0.0
      JAVIS_PORT: "7777"
      JAVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JAVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      BRAINS_DIR: /brains
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777"                      # publish cổng NGẪU NHIÊN (giống Hermes "4860"), KHÔNG cố định 7777:7777
                                    # → nút Open trỏ thẳng domain HTTPS của Traefik, không phải http://<ip>:7777.
    labels:
      # Copy đúng mẫu Hermes: KHÔNG có traefik.docker.network, KHÔNG có networks external.
      # Tên router/service = ${COMPOSE_PROJECT_NAME} (tên project) → chạy được nhiều bản trên cùng VPS.
      # HOST = ${DOMAIN_NAME} BẮT BUỘC: Hostinger KHÔNG tự cấp biến TRAEFIK_HOST cho compose dán tay
      # (chỉ cấp cho app Catalog), nên bạn phải tự đặt DOMAIN_NAME ở ô Environment. Nếu thiếu, deploy
      # sẽ báo lỗi ngay (thay vì ra link cụt). Giá trị: javis.<hostname-vps>.hstgr.cloud hoặc tên miền riêng.
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.rule=Host(`${DOMAIN_NAME:?Thieu DOMAIN_NAME - hay dat DOMAIN_NAME = ten mien cua ban (vd javis.srv1782015.hstgr.cloud) roi deploy lai}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-javis}.loadbalancer.server.port=7777
    volumes:
      - javis-data:/data
      - javis-brains:/brains
      - claude-auth:/home/javis/.claude
      - codex-auth:/home/javis/.codex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JAVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  javis-data:
  javis-brains:
  claude-auth:
  codex-auth:
